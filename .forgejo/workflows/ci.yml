name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
env:
  CI: true
  ELIXIR_VERSION: '1.17.3'
  OTP_VERSION: '27.0'
  PHX_SIGNING_SALT: fake-value-for-testing
  SECRET_KEY_BASE: fake-value-for-testing
jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}
      - name: Cache mix dependencies
        id: mix-cache
        uses: actions/cache@v4
        with:
          path: |
            deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-
      - name: Cache Compilation Artifacts
        id: build-cache
        uses: actions/cache@v4
        with:
          path: |
            _build
          key: ${{ runner.os }}-${{ github.ref }}-build-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ github.ref }}-build-
            ${{ runner.os }}-refs/heads/main-build-
      - name: Install Dependencies
        if: steps.mix-cache.outputs.cache-hit != 'true'
        run: mix deps.get
      - run: mix compile
  test:
    needs: compile
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost/basic_phx_app
    steps:
      - uses: actions/checkout@v4
      - name: Run docker-compose
        uses: hoverkraft-tech/compose-action@v2.0.1
        with:
          compose-file: './docker-compose.yml'
      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}
      - run: mix deps.get
      - run: mix test
  format:
    needs: compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}
      - name: Cache mix dependencies
        id: mix-cache
        uses: actions/cache@v4
        with:
          path: |
            deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
      - name: Cache Compilation Artifacts
        id: build-cache
        uses: actions/cache@v4
        with:
          path: |
            _build
          key: ${{ runner.os }}-${{ github.ref }}-build-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ github.ref }}-build-
            ${{ runner.os }}-refs/heads/main-build-
      - run: mix format --check-formatted
  credo:
    needs: compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}
      - name: Cache mix dependencies
        id: mix-cache
        uses: actions/cache@v4
        with:
          path: |
            deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
      - name: Cache Compilation Artifacts
        id: build-cache
        uses: actions/cache@v4
        with:
          path: |
            _build
          key: ${{ runner.os }}-${{ github.ref }}-build-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ github.ref }}-build-
            ${{ runner.os }}-refs/heads/main-build-
      - run: mix credo
  sobelow:
    needs: compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}
      - name: Cache mix dependencies
        id: mix-cache
        uses: actions/cache@v4
        with:
          path: |
            deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
      - name: Cache Compilation Artifacts
        id: build-cache
        uses: actions/cache@v4
        with:
          path: |
            _build
          key: ${{ runner.os }}-${{ github.ref }}-build-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ github.ref }}-build-
            ${{ runner.os }}-refs/heads/main-build-
      - run: mix sobelow
  audit:
    needs: compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}
      - name: Cache mix dependencies
        id: mix-cache
        uses: actions/cache@v4
        with:
          path: |
            deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
      - name: Cache Compilation Artifacts
        id: build-cache
        uses: actions/cache@v4
        with:
          path: |
            _build
          key: ${{ runner.os }}-${{ github.ref }}-build-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ github.ref }}-build-
            ${{ runner.os }}-refs/heads/main-build-
      - run: |
          mix deps.audit
          mix hex.audit
          mix deps.unlock --check-unused
  gettext:
    needs: compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}
      - name: Cache mix dependencies
        id: mix-cache
        uses: actions/cache@v4
        with:
          path: |
            deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
      - name: Cache Compilation Artifacts
        id: build-cache
        uses: actions/cache@v4
        with:
          path: |
            _build
          key: ${{ runner.os }}-${{ github.ref }}-build-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ github.ref }}-build-
            ${{ runner.os }}-refs/heads/main-build-
      - run: mix gettext.extract --check-up-to-date
  dialyzer:
    needs: compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}
      - name: Cache mix dependencies
        id: mix-cache
        uses: actions/cache@v4
        with:
          path: |
            deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
      - name: Cache Compilation Artifacts
        id: build-cache
        uses: actions/cache@v4
        with:
          path: |
            _build
          key: ${{ runner.os }}-${{ github.ref }}-build-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ github.ref }}-build-
            ${{ runner.os }}-refs/heads/main-build-
      - name: Cache Dialyzer PLTs
        id: dialyzer-cache
        uses: actions/cache@v4
        with:
          path: |
            priv/plts
          key: ${{ runner.os }}-${{ github.ref }}-dialyzer-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ github.ref }}-dialyzer-
            ${{ runner.os }}-refs/heads/main-dialyzer-
      - run: mix dialyzer
